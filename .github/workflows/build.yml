name: Build

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-amd64
            os: windows-latest
            artifact: NetstatUI.exe
          - target: darwin-arm64
            os: macos-latest
            artifact: NetstatUI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Wails 3
        run: go install github.com/wailsapp/wails/v3/cmd/wails3@v3.0.0-alpha.98

      - name: Generate TS bindings
        run: wails3 generate bindings -ts -clean=false

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Build (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          wails3 build
          $dataDst = "bin/data"
          if (Test-Path $dataDst) { Remove-Item -Path $dataDst -Recurse -Force }
          Copy-Item -Path data -Destination $dataDst -Recurse -Force

      - name: Build (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          wails3 build
          rm -rf bin/data
          cp -R data bin/data

      - name: Show binary
        shell: bash
        run: |
          ls -lah bin/
          file bin/${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: bin/
          if-no-files-found: error

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename and zip
        shell: bash
        run: |
          cd dist

          # Windows archive: binary + data/
          mv windows-amd64/NetstatUI.exe NetstatUI.exe
          mv windows-amd64/data data
          zip -r NetstatUI-windows-amd64.zip NetstatUI.exe data
          rm -rf NetstatUI.exe data

          # macOS archive: binary + data/
          mv darwin-arm64/NetstatUI NetstatUI
          mv darwin-arm64/data data
          tar -czf NetstatUI-macos-arm64.tar.gz NetstatUI data
          rm -rf NetstatUI data

          rm -rf windows-amd64 darwin-arm64
          ls -lah

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.tar.gz
          generate_release_notes: true
